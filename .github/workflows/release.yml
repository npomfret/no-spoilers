name: Release

on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Import Developer ID certificate
        env:
          CERT_P12_BASE64: ${{ secrets.DEVELOPER_ID_CERT_P12 }}
          CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 16)"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          CERT_PATH="$RUNNER_TEMP/developer-id.p12"
          echo "$CERT_P12_BASE64" | base64 --decode -o "$CERT_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychain -d user | tr -d '"')

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> "$GITHUB_ENV"

      - name: Write notarytool API key
        env:
          KEY_P8_BASE64: ${{ secrets.NOTARYTOOL_KEY_P8 }}
        run: |
          set -euo pipefail
          KEY_PATH="$RUNNER_TEMP/notarytool.p8"
          echo "$KEY_P8_BASE64" | base64 --decode -o "$KEY_PATH"
          echo "NOTARYTOOL_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"

      - name: Build, sign, notarize, staple
        env:
          NOTARYTOOL_KEY_ID: ${{ secrets.NOTARYTOOL_KEY_ID }}
          NOTARYTOOL_ISSUER_ID: ${{ secrets.NOTARYTOOL_ISSUER_ID }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          bash scripts/release.sh "$VERSION" \
            --platform macos \
            --channel developer-id \
            --notarytool-key "$NOTARYTOOL_KEY_PATH" \
            --notarytool-key-id "$NOTARYTOOL_KEY_ID" \
            --notarytool-issuer "$NOTARYTOOL_ISSUER_ID"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          ZIP_PATH="/tmp/NoSpoilers-${VERSION}.zip"
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --notes "" \
            "$ZIP_PATH"

      - name: Update homebrew tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          ZIP_PATH="/tmp/NoSpoilers-${VERSION}.zip"
          SHA256=$(shasum -a 256 "$ZIP_PATH" | awk '{print $1}')

          TAP_DIR="$RUNNER_TEMP/homebrew-tap"
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/npomfret/homebrew-tap.git" "$TAP_DIR"

          CASK="$TAP_DIR/Casks/no-spoilers.rb"
          sed -i '' "s/version \".*\"/version \"${VERSION}\"/" "$CASK"
          sed -i '' "s/sha256 \".*\"/sha256 \"${SHA256}\"/" "$CASK"

          cd "$TAP_DIR"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/no-spoilers.rb
          git commit -m "Update no-spoilers to v${VERSION}"
          git push

      - name: Clean up keychain
        if: always()
        run: |
          security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
